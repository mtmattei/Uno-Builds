GPU Effect Pipeline

The Win2D effects are compiled into a single Composition effect graph that executes entirely on the GPU. No per-frame CPU callbacks are needed during animation.
  ┌────────────────────────────────────┐
  │  TurbulenceEffect                    │
  │  ────────────────────────────          │
  │  Frequency: Vector2(0.015, 0.015)     │
  │  NumOctaves: 3                        │
  │  Noise: FractalBrownianMotion          │
  └────────────────┬───────────────────┘
                   │ (displacement map)
                   ▼
  ┌────────────────────────────────────┐
  │  DisplacementMapEffect                │
  │  ────────────────────────────          │
  │  Source: ContentSource (XAML capture)  │
  │  Amount: 0 → 80 → 0  [★ ANIMATED]      │
  │  XChannel: Red  |  YChannel: Green     │
  └────────────────┬───────────────────┘
                   │
                   ▼
  ┌────────────────────────────────────┐
  │  GaussianBlurEffect                   │
  │  ────────────────────────────          │
  │  BlurAmount: 0 → 20 → 0  [★ ANIMATED] │
  │  BorderMode: Hard                     │
  └────────────────┬───────────────────┘
                   │
                   ▼
          ┌─────────────┐
          │ SpriteVisual │ → Screen Output
          └─────────────┘

Animation Timeline

The full transition spans ~1600ms across two symmetric phases. The midpoint is the content swap. The turbulence frequency steps discretely at 200ms intervals.
Time (ms)  0      200     400     600     800    1000    1200    1400    1600
           │       │       │       │       │       │       │       │       │
           │───── EXIT PHASE ─────│ SWAP  │──── ENTER PHASE ────│
           │                       │       │                       │
Displace.  0─────────────────────80      80────────────────────0
           │  (ease-in)            │       │  (ease-out)           │
           │                       │       │                       │
Blur       0─────────────────────20      20────────────────────0
           │  (ease-in, lags)      │       │  (ease-out)           │
           │                       │       │                       │
Turbulence .015   .025    .04     .06  │  .06    .04     .025    .015
Freq.      │  (discrete steps)     │       │  (discrete steps)     │
           │                       │       │                       │
Content    [  old content visible  ] ◆ swap  [  new content visible  ]
           │               XAML hidden, effect layer visible          │

Key Constraints & Gotchas

Constraint	Details & Workaround
TurbulenceEffect.Frequency is not animatable	The Composition property system cannot animate Vector2 properties on Win2D effects. Use discrete frequency steps by rebuilding the inner effect at 3–4 intervals during the transition.
VisualSurface is a live reference	If the source UIElement is removed from the visual tree, the surface goes blank. Always capture before removing, and keep the element in the tree (hidden) until the exit phase completes.
Effect compilation is synchronous	CreateEffectFactory() can stall for 5–15ms on first call. Pre-warm the effect on Loaded or during idle time to avoid jank on the first transition.
GPU memory for surfaces	Each CompositionSurfaceBrush holds a GPU render target sized to the element. For large panels (e.g., 1920×1080), this is ~8MB per surface. Null out brush references promptly after transition.
Accessibility: reduced motion	Check UISettings.AnimationsEnabled. If false, skip the effect entirely and do an instant content swap. This respects the system-wide "Show animations" toggle.
Min OS version	CompositionVisualSurface requires Windows 10 2004 (build 19041). The project TargetPlatformMinVersion must be set accordingly.

Implementation Checklist

01  Install Win2D NuGet  — Microsoft.Graphics.Canvas 1.0.6+
02  Create MorphEffectBrush.cs  — Wire Turbulence → Displacement → Blur; expose animatable properties
03  Create ContentCaptureHelper.cs  — VisualSurface capture with correct sizing and alignment
04  Create MorphAnimator.cs  — Exit (ease-in) and Enter (ease-out) keyframe sequences with ScopedBatch
05  Create LiquidMorphPanel control  — XAML layout + code-behind orchestrating the full lifecycle
06  Add frequency stepping  — Discrete TurbulenceEffect.Frequency updates at 200ms intervals
07  Accessibility gate  — Check UISettings.AnimationsEnabled; fall back to instant swap
08  Pre-warm effect factory  — Call Build() once on Loaded to avoid first-transition stall
09  Test GPU memory  — Verify surface brushes are nulled after transition completes
10  Test on integrated GPU  — Confirm 60fps with MaxDisplacement ≤ 120, NumOctaves ≤ 3
