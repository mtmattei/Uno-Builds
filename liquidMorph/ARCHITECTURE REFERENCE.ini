ARCHITECTURE REFERENCE
Liquid Morph Dissolve

Quick-reference companion to the Implementation Guide. Covers the solution structure, class relationships, the GPU effect graph, and the animation timeline at a glance.

Solution Structure

All transition code lives under a Controls/LiquidMorph/ folder in your WinUI 3 project. Four files, no external dependencies beyond Win2D.
File	Purpose
LiquidMorphPanel.xaml	XAML layout with a ContentPresenter and root Grid.
LiquidMorphPanel.xaml.cs	Control lifecycle, Composition visual setup, TransitionTo() orchestration.
MorphEffectBrush.cs	Win2D effect graph: Turbulence → Displacement → Blur. Compiles to CompositionEffectBrush.
MorphAnimator.cs	Keyframe animations for displacement amount and blur radius across exit/enter phases.
ContentCaptureHelper.cs	Static utility to rasterize a UIElement into a CompositionSurfaceBrush via VisualSurface.

